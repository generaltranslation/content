name: Trigger Landing Deploy

on:
  push:
    branches: [main]

jobs:
  build-content:
    name: Build content app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build content app
        run: pnpm build:content

  deploy:
    name: Trigger Vercel rebuild
    runs-on: ubuntu-latest
    needs: build-content
    steps:
      - name: Trigger deploy hook
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
