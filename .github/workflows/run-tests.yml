name: CI - Run tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Check for unsafe patterns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block dangerous HTML tags
        run: |
          if grep -rn --include='*.mdx' -Pi '<\s*(script|iframe|object|embed|style)[\s>/]' .; then
            echo "::error::MDX files must not contain <script>, <iframe>, <object>, <embed>, or <style> tags."
            exit 1
          fi

      - name: Block javascript in URLs
        run: |
          if grep -rn --include='*.mdx' -Pi 'javascript\s*:' .; then
            echo "::error::MDX files must not contain javascript: URLs."
            exit 1
          fi

  validate-links:
    name: Validate internal links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Validate links
        working-directory: scripts
        run: npx tsx validate-links.ts

  build-content:
    name: Build content app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build content app
        run: pnpm build:content

  run-tests:
    if: always()
    runs-on: ubuntu-latest
    needs: [validate, validate-links, build-content]
    steps:
      - name: Check validate
        if: ${{ needs.validate.result != 'success' }}
        run: exit 1
      - name: Check validate-links
        if: ${{ needs.validate-links.result != 'success' }}
        run: exit 1
      - name: Check build-content
        if: ${{ needs.build-content.result != 'success' }}
        run: exit 1
      - run: echo "All checks passed"
